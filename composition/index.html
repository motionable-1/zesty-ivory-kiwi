<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyperframes Composition</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, sans-serif;
      background: transparent;
      color: #18161d;
      font-kerning: normal;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fbfaf7;
    }

    #stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% 16%, rgb(169 139 255 / 0.24), transparent 30%),
        radial-gradient(circle at 22% 80%, rgb(255 255 255 / 0.98), transparent 34%),
        linear-gradient(180deg, #fbfaf7 0%, #f7f4fb 100%);
    }

    .preview-pending-motion {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 220px;
      overflow: hidden;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
    }

    .preview-pending-motion::before {
      position: absolute;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(90deg, rgb(251 250 247 / 0.94) 0%, rgb(251 250 247 / 0.78) 42%, transparent 78%),
        linear-gradient(180deg, rgb(255 255 255 / 0.72), transparent 48%);
    }

    .preview-pending-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.72;
      background-image:
        linear-gradient(90deg, rgb(110 99 255 / 0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgb(110 99 255 / 0.08) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 72%);
    }

    .preview-pending-content {
      position: relative;
      z-index: 2;
      width: 620px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 56px;
      border: 1px solid #e7e3ee;
      border-radius: 8px;
      background: rgb(255 255 255 / 0.84);
      box-shadow:
        0 34px 90px rgb(24 22 29 / 0.12),
        0 10px 28px rgb(24 22 29 / 0.06),
        inset 0 0 0 1px rgb(255 255 255 / 0.72);
      backdrop-filter: blur(18px);
      will-change: transform, opacity;
    }

    .preview-pending-status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1px solid #d7c9ff;
      border-radius: 999px;
      background: #efe8ff;
      color: #5d3fd3;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      text-transform: uppercase;
    }

    .preview-pending-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #6e63ff;
      box-shadow: 0 0 24px rgb(110 99 255 / 0.5);
    }

    .preview-pending-title {
      max-width: 560px;
      margin-top: 24px;
      color: #050505;
      font-size: 58px;
      font-weight: 760;
      letter-spacing: 0;
      line-height: 0.98;
    }

    .preview-pending-subtitle {
      max-width: 430px;
      margin-top: 14px;
      color: #6f6a78;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0;
      line-height: 1.35;
    }

    .preview-pending-progress {
      width: 360px;
      height: 6px;
      margin-top: 32px;
      overflow: hidden;
      border-radius: 999px;
      background: #ece7f4;
    }

    .preview-pending-progress span {
      display: block;
      width: 100%;
      height: 100%;
      transform-origin: left center;
      border-radius: inherit;
      background: linear-gradient(90deg, #6e63ff, #a98bff);
    }
  </style>
</head>
<body>
  <div
    id="stage"
    data-composition-id="Main"
    data-start="0"
    data-duration="11.667"
    data-width="1920"
    data-height="1080"
    data-motionabl-fps="30"
  >
    <div
      id="preview-pending"
      class="clip preview-pending-motion"
      data-start="0"
      data-duration="11.667"
      data-track-index="0"
    >
      <div class="preview-pending-grid" aria-hidden="true"></div>
      <div class="preview-pending-content">
        <div class="preview-pending-status">
          <span class="preview-pending-dot"></span>
          <span>Preview</span>
        </div>
        <div class="preview-pending-title">Preparing preview</div>
        <div class="preview-pending-subtitle">
          Generated motion will appear here when ready.
        </div>
        <div class="preview-pending-progress" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </div>
  </div>

  <script src="./vendor/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    const timeline = gsap.timeline({ paused: true });
    timeline.from(".preview-pending-content", {
      opacity: 0,
      y: 34,
      scale: 0.98,
      duration: 0.8,
      ease: "power4.out",
    }, 0);
    timeline.from(".preview-pending-grid", {
      opacity: 0,
      scale: 1.08,
      duration: 1.1,
      ease: "power3.out",
    }, 0);
    timeline.to(".preview-pending-dot", {
      opacity: 0.35,
      duration: 0.9,
      yoyo: true,
      repeat: 10,
      ease: "sine.inOut",
    }, 0.25);
    timeline.fromTo(".preview-pending-progress span", {
      scaleX: 0.08,
    }, {
      scaleX: 0.82,
      duration: 5.8,
      yoyo: true,
      repeat: 1,
      ease: "power2.inOut",
    }, 0.4);
    timeline.to(".preview-pending-grid", {
      opacity: 0.28,
      duration: 0.001,
      ease: "power1.out",
    }, 11.667);

    window.__timelines.Main = timeline;
  </script>
</body>
</html>
