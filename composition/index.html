<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iMessage Notification Reveal</title>
  
  <!-- Import Lato font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: light;
      font-family: 'Lato', sans-serif;
      background: transparent;
      color: #000000;
      font-kerning: normal;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #ffffff;
    }

    #stage {
      position: relative;
      width: 1080px;
      height: 312px;
      overflow: hidden;
      background: #ffffff;
    }

    #notification-clip {
      position: absolute;
      inset: 0;
      width: 1080px;
      height: 312px;
      overflow: hidden;
    }

    .notification-group {
      position: absolute;
      left: 60px;
      top: 60px;
      width: 960px;
      height: 192px;
      transform-style: preserve-3d;
      will-change: transform, opacity;
      opacity: 0; /* Animated */
    }

    .notification-background {
      position: absolute;
      left: 0;
      top: 0;
      width: 960px;
      height: 192px;
      border-radius: 56px;
      background-color: rgba(230, 230, 230, 0.9);
      /* Premium iOS glass effect and shadow */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 4px rgba(0, 0, 0, 0.03);
    }

    .icon {
      position: absolute;
      left: 36px;
      top: 36px;
      width: 120px;
      height: 120px;
      border-radius: 12px;
      will-change: transform;
      transform: scale(0.5); /* Animated */
    }

    .text-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .title {
      position: absolute;
      left: 192px;
      top: 40px;
      width: 600px;
      height: 56px;
      color: #000000;
      font-weight: 700;
      font-size: 42px;
      line-height: 56px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
    }

    .time {
      position: absolute;
      left: 844px;
      top: 40px;
      width: 68px;
      height: 56px;
      color: #000000;
      font-weight: 400;
      font-size: 36px;
      line-height: 56px;
      text-align: right;
      opacity: 0.4;
    }

    .subtitle {
      position: absolute;
      left: 192px;
      top: 96px;
      width: 728px;
      height: 56px;
      color: #000000;
      font-weight: 400;
      font-size: 42px;
      line-height: 56px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
    }

    .word-wrapper {
      display: inline-block;
      overflow: hidden;
      vertical-align: top;
      height: 56px;
      margin-right: 12px; /* space between words */
    }

    /* Remove margin-right for the last word */
    .word-wrapper:last-child {
      margin-right: 0;
    }

    .title-word, .subtitle-word {
      display: inline-block;
      opacity: 0; /* Animated */
      transform: translateY(50px); /* Animated */
      will-change: transform, opacity;
    }
  </style>
</head>
<body>
  <div
    id="stage"
    data-composition-id="Main"
    data-start="0"
    data-duration="3"
    data-width="1080"
    data-height="312"
    data-motionabl-fps="30"
  >
    <div
      id="notification-clip"
      class="clip"
      data-start="0"
      data-duration="3"
      data-track-index="0"
    >
      <div class="notification-group">
        <!-- Notification background bubble -->
        <div class="notification-background"></div>

        <!-- iMessage Logo Icon -->
        <img
          class="icon"
          src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/uploads/1780410541547_o8es724pwk_3d06f50f_4715_4475_a42c_e4cddc5bdf1d.svg"
          alt="iMessage Icon"
        />

        <!-- Text layer content -->
        <div class="text-container">
          <div class="title" id="title-text">Motionabl</div>
          <div class="time">now</div>
          <div class="subtitle" id="subtitle-text">Your cinematic edit is complete! 🚀</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./vendor/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    // Dynamically split text content into staggerable word blocks.
    // Supports custom messages via HTML edit or URL query parameters (?title=...&subtitle=...)
    function splitTextIntoWords(elementId, wordClass, queryParamName) {
      const element = document.getElementById(elementId);
      if (!element) return;

      const urlParams = new URLSearchParams(window.location.search);
      const urlText = urlParams.get(queryParamName);
      const text = (urlText ? decodeURIComponent(urlText) : element.textContent).trim();
      
      const words = text.split(/\s+/);
      element.innerHTML = '';
      words.forEach(word => {
        const wrapper = document.createElement('span');
        wrapper.className = 'word-wrapper';
        const span = document.createElement('span');
        span.className = wordClass;
        span.textContent = word;
        wrapper.appendChild(span);
        element.appendChild(wrapper);
      });
    }

    // Split text fields into individually animatable elements
    splitTextIntoWords('title-text', 'title-word', 'title');
    splitTextIntoWords('subtitle-text', 'subtitle-word', 'subtitle');

    const tl = gsap.timeline({ paused: true });

    // 1. Group entry at 0.0s (0.0s to 0.4s)
    // Scale from 0.6 to 1 with back.out ease, duration 0.4s (12 frames)
    tl.fromTo(".notification-group", {
      scale: 0.6,
      transformOrigin: "center center"
    }, {
      scale: 1,
      duration: 0.4,
      ease: "back.out(1.5)"
    }, 0);

    // Group opacity from 0 to 1 with linear ease, duration 0.15s (4.5 frames)
    tl.fromTo(".notification-group", {
      opacity: 0
    }, {
      opacity: 1,
      duration: 0.15,
      ease: "none"
    }, 0);

    // 2. Icon scale-in at 0.1s (0.1s to 0.4s)
    // growIn: scale from 0.5 to 1 with back.out, duration 0.3s (9 frames)
    tl.fromTo(".icon", {
      scale: 0.5,
      transformOrigin: "center center"
    }, {
      scale: 1,
      duration: 0.3,
      ease: "back.out(1.5)"
    }, 0.1);

    // 3. Title slide and fade at 0.2s (0.2s to 0.45s)
    // slideAndFade: y from 50px to 0, opacity from 0 to 1
    // Stagger words by 0.05s, each word duration 0.2s (6 frames)
    tl.fromTo(".title-word", {
      y: 50,
      opacity: 0
    }, {
      y: 0,
      opacity: 1,
      duration: 0.2,
      stagger: 0.05,
      ease: "power2.out"
    }, 0.2);

    // 4. Subtitle slide and fade at 0.5s (0.5s to 0.95s)
    // slideAndFade: y from 50px to 0, opacity from 0 to 1
    // Stagger words by 0.05s, each word duration 0.2s (6 frames)
    tl.fromTo(".subtitle-word", {
      y: 50,
      opacity: 0
    }, {
      y: 0,
      opacity: 1,
      duration: 0.2,
      stagger: 0.05,
      ease: "power2.out"
    }, 0.5);

    // 5. Shrink Out exit at 2.7s (2.7s to 2.9s)
    // Scale to 0.8, Opacity to 0 with power2.in ease, duration 0.2s (6 frames)
    tl.to(".notification-group", {
      scale: 0.8,
      opacity: 0,
      duration: 0.2,
      ease: "power2.in"
    }, 2.7);

    window.__timelines.Main = tl;
  </script>
</body>
</html>
